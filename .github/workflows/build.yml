name: Build FFmpeg Debian Package

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FFMPEG_TAG: n8.1
  FDK_AAC_TAG: v2.0.3
  PKG_NAME: ffmpeg-radiofrance
  INSTALL_PREFIX: /usr/local

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            libbz2-dev \
            libogg-dev \
            libmp3lame-dev \
            libsrt-dev \
            libssl-dev \
            libvorbis-dev \
            libtool \
            nasm \
            pkg-config \
            zlib1g-dev

      - name: Build fdk-aac from source
        run: |
          git clone --depth 1 --branch ${{ env.FDK_AAC_TAG }} \
            https://github.com/mstorsjo/fdk-aac.git
          cd fdk-aac
          autoreconf -fi
          ./configure \
            --prefix=$GITHUB_WORKSPACE/deps \
            --enable-static \
            --disable-shared \
            CXXFLAGS="-fPIC"
          make -j$(nproc)
          make install

      - name: Clone FFmpeg
        run: |
          git clone --depth 1 --branch ${{ env.FFMPEG_TAG }} \
            https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

      - name: Configure FFmpeg
        run: |
          cd ffmpeg-src
          PKG_CONFIG_PATH="$GITHUB_WORKSPACE/deps/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig" \
          ./configure \
            --prefix=${{ env.INSTALL_PREFIX }} \
            --enable-static \
            --disable-shared \
            --disable-everything \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-avdevice \
            --disable-postproc \
            --enable-ffmpeg \
            --enable-gpl \
            --enable-nonfree \
            --enable-openssl \
            --enable-bzlib \
            --enable-zlib \
            --enable-libfdk-aac \
            --enable-libmp3lame \
            --enable-libsrt \
            --enable-libvorbis \
            --enable-protocol=file \
            --enable-protocol=pipe \
            --enable-protocol=srt \
            --enable-protocol=srtp \
            --enable-protocol=tcp \
            --enable-protocol=udp \
            --enable-demuxer=aac \
            --enable-demuxer=flac \
            --enable-demuxer=matroska \
            --enable-demuxer=mpegts \
            --enable-demuxer=mpegtsraw \
            --enable-demuxer=ogg \
            --enable-muxer=adts \
            --enable-muxer=flac \
            --enable-muxer=matroska \
            --enable-muxer=mpegts \
            --enable-muxer=ogg \
            --enable-decoder=aac \
            --enable-decoder=aac_fixed \
            --enable-decoder=aac_latm \
            --enable-decoder=flac \
            --enable-decoder=libfdk_aac \
            --enable-decoder=libvorbis \
            --enable-decoder=mp2 \
            --enable-decoder=mp2float \
            --enable-decoder=mp3 \
            --enable-decoder=mp3float \
            --enable-decoder=pcm_f32be \
            --enable-decoder=pcm_f32le \
            --enable-decoder=pcm_s16be \
            --enable-decoder=pcm_s16le \
            --enable-decoder=pcm_s24be \
            --enable-decoder=pcm_s24le \
            --enable-decoder=pcm_s32be \
            --enable-decoder=pcm_s32le \
            --enable-decoder=pcm_u8 \
            --enable-decoder=vorbis \
            --enable-encoder=aac \
            --enable-encoder=flac \
            --enable-encoder=libfdk_aac \
            --enable-encoder=libmp3lame \
            --enable-encoder=libvorbis \
            --enable-encoder=mp2 \
            --enable-encoder=mp2fixed \
            --enable-encoder=pcm_f32be \
            --enable-encoder=pcm_f32le \
            --enable-encoder=pcm_s16be \
            --enable-encoder=pcm_s16le \
            --enable-encoder=pcm_s24be \
            --enable-encoder=pcm_s24le \
            --enable-encoder=pcm_s32be \
            --enable-encoder=pcm_s32le \
            --enable-encoder=pcm_u8 \
            --enable-encoder=vorbis \
            --enable-filter=abuffersink \
            --enable-filter=abuffersrc \
            --enable-filter=aformat \
            --enable-filter=anull \
            --enable-filter=aresample \
            --enable-parser=aac \
            --enable-parser=aac_latm \
            --enable-parser=flac \
            --enable-parser=mpegaudio \
            --enable-parser=vorbis \
            --extra-cflags="-I$GITHUB_WORKSPACE/deps/include" \
            --extra-ldflags="-L$GITHUB_WORKSPACE/deps/lib" \
            --extra-libs="-lpthread -lm -ldl" \
            --pkg-config-flags="--static"

      - name: Build FFmpeg
        run: make -j$(nproc) -C ffmpeg-src

      - name: Install FFmpeg to staging
        run: make -C ffmpeg-src install DESTDIR=$GITHUB_WORKSPACE/staging

      - name: Bundle external static libraries
        run: |
          DEST=$GITHUB_WORKSPACE/staging${{ env.INSTALL_PREFIX }}/lib

          # fdk-aac was built from source
          cp $GITHUB_WORKSPACE/deps/lib/libfdk-aac.a "$DEST/"

          # Collect static libraries from system -dev packages
          for lib in libmp3lame libsrt libogg libvorbis libvorbisenc libssl libcrypto libz libbz2; do
            src=$(find /usr/lib/x86_64-linux-gnu /usr/lib -maxdepth 1 -name "${lib}.a" 2>/dev/null | head -1)
            if [ -n "$src" ]; then
              cp "$src" "$DEST/"
              echo "Bundled: $src"
            else
              echo "WARNING: ${lib}.a not found" >&2
            fi
          done

      - name: Create Debian package
        run: |
          VERSION=${{ env.FFMPEG_TAG }}
          VERSION=${VERSION#n}
          STAGING=$GITHUB_WORKSPACE/staging

          mkdir -p "$STAGING/DEBIAN"
          cat > "$STAGING/DEBIAN/control" <<EOF
          Package: ${{ env.PKG_NAME }}
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Radio France <ops@radiofrance.fr>
          Description: FFmpeg static build for Radio France
           Static FFmpeg CLI and libav* libraries with support for mpegts,
           matroska, ogg, flac, pcm, aac, mp3, mp2, srt with TLS, and
           fdk-aac. All external dependency static archives are bundled.
          EOF

          dpkg-deb --build --root-owner-group "$STAGING" \
            "$GITHUB_WORKSPACE/${{ env.PKG_NAME }}_${VERSION}_amd64.deb"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: "*.deb"

  test:
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}

      - name: Install package
        run: sudo dpkg -i *.deb

      - name: Install build tools
        run: sudo apt-get install -y build-essential pkg-config

      - name: Build test program
        run: |
          export PKG_CONFIG_PATH=${{ env.INSTALL_PREFIX }}/lib/pkgconfig
          CFLAGS=$(pkg-config --cflags libavcodec libavformat libavutil libswresample)
          LIBS=$(pkg-config --libs --static libavcodec libavformat libavutil libswresample)
          gcc test/hello.c -o hello_ffmpeg $CFLAGS \
            -Wl,--start-group $LIBS -lpthread -lm -ldl -Wl,--end-group

      - name: Run test program
        run: ./hello_ffmpeg

      - name: Verify ffmpeg binary
        run: ${{ env.INSTALL_PREFIX }}/bin/ffmpeg -version
