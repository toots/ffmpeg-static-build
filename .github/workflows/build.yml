name: Build FFmpeg Debian Package

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FFMPEG_TAG: n8.1
  PKG_NAME: ffmpeg-liquidsoap
  INSTALL_PREFIX: /usr/local

jobs:
  dep-openssl:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-openssl.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libogg:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libogg.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libopus:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libopus.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-lame:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-lame.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libshine:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libshine.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libflac:
    needs: dep-libogg
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libflac.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-fdk-aac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-fdk-aac.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-x264:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-x264.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-x265:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-x265.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libvpx:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libvpx.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-svtav1:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-svtav1.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-dav1d:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-dav1d.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libsoxr:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libsoxr.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libfreetype:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libfreetype.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-fribidi:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-fribidi.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-srt:
    needs: dep-openssl
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-srt.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libvorbis:
    needs: dep-libogg
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libvorbis.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-harfbuzz:
    needs: dep-libfreetype
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-harfbuzz.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  dep-libass:
    needs: [dep-libfreetype, dep-fribidi, dep-harfbuzz]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    uses: ./.github/workflows/dep-libass.yml
    with:
      arch: ${{ matrix.arch }}
      runner: ${{ matrix.runner }}

  build:
    needs:
      - dep-openssl
      - dep-srt
      - dep-libflac
      - dep-libogg
      - dep-libvorbis
      - dep-libopus
      - dep-lame
      - dep-libshine
      - dep-fdk-aac
      - dep-x264
      - dep-x265
      - dep-libvpx
      - dep-svtav1
      - dep-dav1d
      - dep-libsoxr
      - dep-libfreetype
      - dep-fribidi
      - dep-harfbuzz
      - dep-libass
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libbz2-dev \
            nasm \
            pkg-config \
            zlib1g-dev

      - name: Restore OpenSSL cache
        uses: actions/cache/restore@v4
        with:
          path: deps/openssl
          key: ${{ matrix.arch }}-dep-openssl-${{ hashFiles('.github/workflows/dep-openssl.yml') }}

      - name: Restore SRT cache
        uses: actions/cache/restore@v4
        with:
          path: deps/srt
          key: ${{ matrix.arch }}-dep-srt-${{ hashFiles('.github/workflows/dep-srt.yml', '.github/workflows/dep-openssl.yml') }}

      - name: Restore libflac cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libflac
          key: ${{ matrix.arch }}-dep-libflac-${{ hashFiles('.github/workflows/dep-libflac.yml', '.github/workflows/dep-libogg.yml') }}

      - name: Restore libogg cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libogg
          key: ${{ matrix.arch }}-dep-libogg-${{ hashFiles('.github/workflows/dep-libogg.yml') }}

      - name: Restore libvorbis cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libvorbis
          key: ${{ matrix.arch }}-dep-libvorbis-${{ hashFiles('.github/workflows/dep-libvorbis.yml', '.github/workflows/dep-libogg.yml') }}

      - name: Restore libopus cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libopus
          key: ${{ matrix.arch }}-dep-libopus-${{ hashFiles('.github/workflows/dep-libopus.yml') }}

      - name: Restore lame cache
        uses: actions/cache/restore@v4
        with:
          path: deps/lame
          key: ${{ matrix.arch }}-dep-lame-${{ hashFiles('.github/workflows/dep-lame.yml') }}

      - name: Restore libshine cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libshine
          key: ${{ matrix.arch }}-dep-libshine-${{ hashFiles('.github/workflows/dep-libshine.yml') }}

      - name: Restore fdk-aac cache
        uses: actions/cache/restore@v4
        with:
          path: deps/fdk-aac
          key: ${{ matrix.arch }}-dep-fdk-aac-${{ hashFiles('.github/workflows/dep-fdk-aac.yml') }}

      - name: Restore x264 cache
        uses: actions/cache/restore@v4
        with:
          path: deps/x264
          key: ${{ matrix.arch }}-dep-x264-${{ hashFiles('.github/workflows/dep-x264.yml') }}

      - name: Restore x265 cache
        uses: actions/cache/restore@v4
        with:
          path: deps/x265
          key: ${{ matrix.arch }}-dep-x265-${{ hashFiles('.github/workflows/dep-x265.yml') }}

      - name: Restore libvpx cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libvpx
          key: ${{ matrix.arch }}-dep-libvpx-${{ hashFiles('.github/workflows/dep-libvpx.yml') }}

      - name: Restore SVT-AV1 cache
        uses: actions/cache/restore@v4
        with:
          path: deps/svtav1
          key: ${{ matrix.arch }}-dep-svtav1-${{ hashFiles('.github/workflows/dep-svtav1.yml') }}

      - name: Restore dav1d cache
        uses: actions/cache/restore@v4
        with:
          path: deps/dav1d
          key: ${{ matrix.arch }}-dep-dav1d-${{ hashFiles('.github/workflows/dep-dav1d.yml') }}

      - name: Restore libsoxr cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libsoxr
          key: ${{ matrix.arch }}-dep-libsoxr-${{ hashFiles('.github/workflows/dep-libsoxr.yml') }}

      - name: Restore libfreetype cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libfreetype
          key: ${{ matrix.arch }}-dep-libfreetype-${{ hashFiles('.github/workflows/dep-libfreetype.yml') }}

      - name: Restore fribidi cache
        uses: actions/cache/restore@v4
        with:
          path: deps/fribidi
          key: ${{ matrix.arch }}-dep-fribidi-${{ hashFiles('.github/workflows/dep-fribidi.yml') }}

      - name: Restore harfbuzz cache
        uses: actions/cache/restore@v4
        with:
          path: deps/harfbuzz
          key: ${{ matrix.arch }}-dep-harfbuzz-${{ hashFiles('.github/workflows/dep-harfbuzz.yml', '.github/workflows/dep-libfreetype.yml') }}

      - name: Restore libass cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libass
          key: ${{ matrix.arch }}-dep-libass-${{ hashFiles('.github/workflows/dep-libass.yml', '.github/workflows/dep-libfreetype.yml', '.github/workflows/dep-fribidi.yml', '.github/workflows/dep-harfbuzz.yml') }}

      - name: Restore FFmpeg staging cache
        id: cache-staging
        uses: actions/cache@v4
        with:
          path: staging
          key: ${{ matrix.arch }}-staging-ffmpeg${{ env.FFMPEG_TAG }}-${{ hashFiles('.github/workflows/dep-openssl.yml', '.github/workflows/dep-srt.yml', '.github/workflows/dep-libflac.yml', '.github/workflows/dep-libogg.yml', '.github/workflows/dep-libvorbis.yml', '.github/workflows/dep-libopus.yml', '.github/workflows/dep-lame.yml', '.github/workflows/dep-libshine.yml', '.github/workflows/dep-fdk-aac.yml', '.github/workflows/dep-x264.yml', '.github/workflows/dep-x265.yml', '.github/workflows/dep-libvpx.yml', '.github/workflows/dep-svtav1.yml', '.github/workflows/dep-dav1d.yml', '.github/workflows/dep-libsoxr.yml', '.github/workflows/dep-libfreetype.yml', '.github/workflows/dep-fribidi.yml', '.github/workflows/dep-harfbuzz.yml', '.github/workflows/dep-libass.yml', '.github/workflows/build.yml') }}

      - name: Clone FFmpeg
        if: steps.cache-staging.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.FFMPEG_TAG }} \
            https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

      - name: Configure FFmpeg
        if: steps.cache-staging.outputs.cache-hit != 'true'
        run: |
          DEPS_DIR=$GITHUB_WORKSPACE/deps
          PKG_CONFIG_PATH=$(find $DEPS_DIR -name pkgconfig -type d | tr '\n' ':')
          CFLAGS_EXTRA=$(find $DEPS_DIR -maxdepth 2 -name include -type d | sed 's|^|-I|' | tr '\n' ' ')
          LDFLAGS_EXTRA=$(find $DEPS_DIR -maxdepth 2 -name lib -type d | sed 's|^|-L|' | tr '\n' ' ')

          cd ffmpeg-src
          PKG_CONFIG_PATH="$PKG_CONFIG_PATH" \
          ./configure \
            --prefix=${{ env.INSTALL_PREFIX }} \
            --enable-static \
            --disable-shared \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages \
            --disable-ffmpeg \
            --disable-ffplay \
            --disable-ffprobe \
            --enable-gpl \
            --enable-nonfree \
            --enable-openssl \
            --enable-bzlib \
            --enable-zlib \
            --enable-network \
            --enable-libass \
            --enable-libfdk-aac \
            --enable-libfreetype \
            --enable-libmp3lame \
            --enable-libshine \
            --enable-libopus \
            --enable-libsoxr \
            --enable-libsrt \
            --enable-libvorbis \
            --enable-libvpx \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libsvtav1 \
            --enable-libdav1d \
            --enable-pic \
            --extra-cflags="-fPIC $CFLAGS_EXTRA" \
            --extra-ldflags="$LDFLAGS_EXTRA" \
            --extra-libs="-lpthread -lm -ldl" \
            --pkg-config-flags="--static"

      - name: Dump config.log on configure failure
        if: failure()
        run: |
          LOG=ffmpeg-src/ffbuild/config.log
          if [ -f "$LOG" ]; then
            grep -A 20 "x265" "$LOG" || tail -100 "$LOG"
          fi

      - name: Build FFmpeg
        if: steps.cache-staging.outputs.cache-hit != 'true'
        run: make -j$(nproc) -C ffmpeg-src

      - name: Install FFmpeg to staging
        if: steps.cache-staging.outputs.cache-hit != 'true'
        run: make -C ffmpeg-src install DESTDIR=$GITHUB_WORKSPACE/staging

      - name: Bundle external static libraries and headers
        if: steps.cache-staging.outputs.cache-hit != 'true'
        run: |
          LIB=$GITHUB_WORKSPACE/staging${{ env.INSTALL_PREFIX }}/lib
          INC=$GITHUB_WORKSPACE/staging${{ env.INSTALL_PREFIX }}/include

          find $GITHUB_WORKSPACE/deps -name "*.a" -exec cp {} "$LIB/" \;

          find $GITHUB_WORKSPACE/deps -mindepth 2 -maxdepth 2 -name include -type d | while read dir; do
            cp -r "$dir/." "$INC/"
          done

          find $GITHUB_WORKSPACE/deps -name pkgconfig -type d | while read dir; do
            cp -r "$dir/." "$LIB/pkgconfig/"
          done

          DEPS_DIR=$GITHUB_WORKSPACE/deps
          find "$LIB/pkgconfig/" -name "*.pc" | while read pc; do
            sed -i \
              -e "s|^prefix=.*|prefix=${{ env.INSTALL_PREFIX }}|" \
              -e "s|${DEPS_DIR}/[^/]*/lib|${{ env.INSTALL_PREFIX }}/lib|g" \
              -e "s|${DEPS_DIR}/[^/]*/include|${{ env.INSTALL_PREFIX }}/include|g" \
              "$pc"
          done

          for lib in libz libbz2; do
            src=$(find /usr/lib/x86_64-linux-gnu /usr/lib/aarch64-linux-gnu /usr/lib -maxdepth 1 -name "${lib}.a" 2>/dev/null | head -1)
            if [ -n "$src" ]; then
              cp "$src" "$LIB/"
            else
              echo "WARNING: ${lib}.a not found" >&2
            fi
          done

      - name: Create Debian package
        run: |
          VERSION=${{ env.FFMPEG_TAG }}
          VERSION=${VERSION#n}
          STAGING=$GITHUB_WORKSPACE/staging

          mkdir -p "$STAGING/DEBIAN"
          cat > "$STAGING/DEBIAN/control" <<EOF
          Package: ${{ env.PKG_NAME }}
          Version: ${VERSION}
          Architecture: ${{ matrix.arch }}
          Maintainer: Liquidsoap <dev@liquidsoap.info>
          Description: FFmpeg static build for Liquidsoap
           Static libav* libraries with all built-in codecs and containers,
           plus aac (fdk-aac), mp3 (lame), opus, vorbis, h264 (x264), h265
           (x265), vp8/vp9 (libvpx), av1 (SVT-AV1/dav1d), ass subtitles,
           freetype text rendering, high-quality resampling (soxr), and srt
           with TLS. All external dependencies are built from source and
           bundled as static archives.
          EOF

          dpkg-deb --build --root-owner-group "$STAGING" \
            "$GITHUB_WORKSPACE/${{ env.PKG_NAME }}_${VERSION}_${{ matrix.arch }}.deb"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.arch }}
          path: "*.deb"

  test:
    runs-on: ${{ matrix.runner }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    container: debian:trixie

    steps:
      - uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.arch }}

      - name: Install build tools and package
        run: |
          apt-get update
          apt-get install -y build-essential pkg-config ./*.deb

      - name: Build test program
        run: |
          export PKG_CONFIG_PATH=${{ env.INSTALL_PREFIX }}/lib/pkgconfig
          CFLAGS=$(pkg-config --cflags libavcodec libavformat libavutil libswresample)
          LIBS=$(pkg-config --libs --static libavcodec libavformat libavutil libswresample)
          gcc test/hello.c -o hello_ffmpeg $CFLAGS \
            -Wl,--start-group $LIBS -lpthread -lm -ldl -Wl,--end-group

      - name: Run test program
        run: ./hello_ffmpeg

  publish:
    runs-on: ubuntu-24.04
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download amd64 package
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-amd64
          path: repo/pool/main

      - name: Download arm64 package
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-arm64
          path: repo/pool/main

      - name: Install repo tools
        run: sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Import GPG signing key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Build Debian repository structure
        run: |
          mkdir -p repo/dists/stable/main/binary-amd64
          mkdir -p repo/dists/stable/main/binary-arm64

          cd repo
          dpkg-scanpackages --arch amd64 pool/main/ > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool/main/ > dists/stable/main/binary-arm64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-arm64/Packages

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Liquidsoap" \
            -o APT::FTPArchive::Release::Label="Liquidsoap FFmpeg" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="Liquidsoap static FFmpeg build" \
            release dists/stable/ > dists/stable/Release

          gpg --batch --yes --clearsign \
            -o dists/stable/InRelease dists/stable/Release
          gpg --batch --yes --armor --detach-sign \
            -o dists/stable/Release.gpg dists/stable/Release

          gpg --armor --export > key.asc

      - name: Create index page
        run: |
          REPO_URL="https://liquidsoap.info/ffmpeg-static-build"
          VERSION=${{ env.FFMPEG_TAG }}
          VERSION=${VERSION#n}
          cat > repo/index.html <<EOF
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Liquidsoap FFmpeg Repository</title></head>
          <body>
          <h1>Liquidsoap FFmpeg Debian Repository</h1>
          <p>FFmpeg ${VERSION} &mdash; all built-in codecs and containers, plus h264, h265, vp8/vp9, av1, aac (fdk-aac), mp3, opus, vorbis, ass, freetype, soxr resampling, srt (TLS). Supports amd64 and arm64.</p>
          <h2>Setup</h2>
          <pre>
          curl -fsSL ${REPO_URL}/key.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/liquidsoap-ffmpeg.gpg
          echo "deb ${REPO_URL} stable main" | sudo tee /etc/apt/sources.list.d/liquidsoap-ffmpeg.list
          sudo apt-get update
          sudo apt-get install ${{ env.PKG_NAME }}
          </pre>
          </body></html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
