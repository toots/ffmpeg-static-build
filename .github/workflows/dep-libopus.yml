name: Build libopus

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libopus
          key: ${{ inputs.arch }}-dep-libopus-${{ hashFiles('.github/workflows/dep-libopus.yml') }}

      - name: Install build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential autoconf automake libtool

      - name: Build libopus
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          OPUS_TAG: v1.5.2
        run: |
          git clone --depth 1 --branch $OPUS_TAG \
            https://github.com/xiph/opus.git
          cd opus
          ./autogen.sh
          ./configure \
            --prefix=$GITHUB_WORKSPACE/deps/libopus \
            --enable-static \
            --disable-shared \
            --disable-extra-programs \
            --disable-doc \
            CFLAGS="-fPIC"
          make -j$(nproc)
          make install

      - name: Save cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: deps/libopus
          key: ${{ inputs.arch }}-dep-libopus-${{ hashFiles('.github/workflows/dep-libopus.yml') }}
