name: Build libshine

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libshine
          key: ${{ inputs.arch }}-dep-libshine-${{ hashFiles('.github/workflows/dep-libshine.yml') }}

      - name: Install build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential autoconf automake libtool

      - name: Build libshine
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          SHINE_TAG: "3.1.1"
        run: |
          git clone --depth 1 --branch $SHINE_TAG \
            https://github.com/toots/shine.git
          cd shine
          ./bootstrap
          ./configure \
            --prefix=$GITHUB_WORKSPACE/deps/libshine \
            --enable-static \
            --disable-shared \
            CFLAGS="-fPIC"
          make -j$(nproc)
          make install

      - name: Save cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: deps/libshine
          key: ${{ inputs.arch }}-dep-libshine-${{ hashFiles('.github/workflows/dep-libshine.yml') }}
